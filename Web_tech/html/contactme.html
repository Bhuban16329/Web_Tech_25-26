<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post">
      <fieldset>
        <legend>Contact Me</legend>
        <table>
            
            <tr>
                <td><label for="First Name">First Name:</label></td>
                <td><input type="text" id="First Name" First Name="First Name"></td>
            </tr>
            <tr>
                <td><label for="Last Name">Last Name:</label></td>
                <td><input type="text" id="Last Name" Last Name="Last Name"></td>
            </tr>
            <tr>
                <td><label>Gender:</label></td>
                <td>
                    <input type="radio" name="Gender" value="Male">Male
                    <input type="radio" name="Gender" value="Female">Female
                </td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="Email" id="Email" name="Email"></td>
            </tr>
        </table>
      </fieldset>
      
      <fieldset>
        <tr>
            <td><label>Services:</label></td>
        </tr>
        <tr>
            <td>
                <input type="checkbox" value="web development">Web Development
                <input type="checkbox" value="ai/ml">AI/ML
                <input type="checkbox" value="backend">Backend
            </td>
        </tr>
      </fieldset>
      <fieldset>
        <tr>
            <td><label for="reason">Reason of Contact:</label></td>
            <td>
                <select name="reason" id="reason">
                    <option>Job</option>
                    <option>Project</option>
                    <option>Thesis</option>
                </select>
            </td>
        </tr>
      </fieldset>

      <fieldset>
        <tr>
            <td><label>Book Slot:</label></td>
            <td><input type="date" id="date" name="date"></td>
        </tr> 
      </fieldset>

      <fieldset>

      </fieldset>
    </form>    
</body>
</html>
